name: build

on: [push]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1

      - name: Bun setup
        uses: antongolub/action-setup-bun@v1
        with:
          bun-version: 1.3.6

      - uses: tacoss/nodejs@master
        env:
          BROWSER: chromium:headless
        with:
          args: make ci
