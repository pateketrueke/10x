name: Release Binaries

on:
  release:
    types: [created]

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux x64
        run: bun run build:bin:linux

      - name: Build macOS x64
        run: bun run build:bin:macos

      - name: Build macOS arm64
        run: bun run build:bin:macos-arm

      - name: Build Windows x64
        run: bun run build:bin:windows

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bin/10x-linux-x64
            dist/bin/10x-macos-x64
            dist/bin/10x-macos-arm64
            dist/bin/10x-windows-x64.exe
