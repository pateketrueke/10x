<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10x DevTools Playground</title>
  <meta name="description" content="Debug and inspect 10x signals in real-time">
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script type="module">
    import './dist/editor.js';
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #090c12;
      --bg-alt: #0d1119;
      --ink: #e2e8f0;
      --muted: #64748b;
      --accent: #2dd4bf;
      --accent2: #818cf8;
      --mono: "IBM Plex Mono", monospace;
      --sans: "Space Grotesk", sans-serif;
    }
    html, body {
      margin: 0; padding: 0;
      font-family: var(--sans);
      color: var(--ink);
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: 100vh;
      overflow: hidden;
    }
    .editor-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .pane-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.025);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .pane-title {
      font: 600 .82rem var(--mono);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .tbar-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .tbar-dot.r { background: #ff5f57; }
    .tbar-dot.y { background: #ffbd2e; }
    .tbar-dot.g { background: #28c840; }
    .pane-badge {
      margin-left: auto;
      font: 600 .67rem var(--mono);
      letter-spacing: 0.1em;
      color: var(--accent);
      background: rgba(45,212,191,0.1);
      border: 1px solid rgba(45,212,191,0.25);
      border-radius: 99px;
      padding: 0.18rem 0.5rem;
    }
    .file-tabs {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.5rem 0.75rem;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      overflow-x: auto;
    }
    .file-tab {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.7rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      cursor: pointer;
      font: 500 .75rem var(--mono);
      color: var(--muted);
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }
    .file-tab:hover {
      background: rgba(255,255,255,0.08);
      color: var(--ink);
    }
    .file-tab.active {
      background: rgba(45,212,191,0.12);
      border-color: rgba(45,212,191,0.35);
      color: var(--accent);
    }
    .file-tab .close-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .file-tab .close-btn:hover {
      background: rgba(255,95,87,0.3);
      color: #ff5f57;
    }
    .file-tab.active .close-btn:hover {
      background: rgba(255,95,87,0.4);
    }
    .add-file-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
    }
    .add-file-btn:hover {
      border-color: rgba(45,212,191,0.4);
      color: var(--accent);
      background: rgba(45,212,191,0.08);
    }
    .editors-container {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }
    .playground-editor {
      position: absolute;
      inset: 0;
      display: none;
      min-height: 0;
    }
    .playground-editor.active {
      display: block;
    }
    .devtools-pane {
      display: flex;
      flex-direction: column;
      background: var(--bg-alt);
    }
    #devtools-container {
      flex: 1;
      overflow: hidden;
    }
    .tabbar {
      display: flex;
      gap: 0.35rem;
      margin-left: auto;
    }
    .tab-btn {
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font: 600 .68rem var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 0.2rem 0.55rem;
      cursor: pointer;
    }
    .tab-btn.active {
      color: var(--ink);
      border-color: rgba(45,212,191,0.45);
      background: rgba(45,212,191,0.14);
    }
    .tab-panels {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }
    .tab-panel {
      position: absolute;
      inset: 0;
      display: none;
      min-height: 0;
      overflow: auto;
      padding: 0.5rem;
    }
    .tab-panel.active {
      display: block;
    }
    #log-container {
      font: 500 .73rem/1.45 var(--mono);
      color: #d0d7de;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log-line {
      padding: 0.2rem 0.15rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .log-line[data-level="error"] { color: #ff9b9b; }
    .log-line[data-level="warn"] { color: #ffd18a; }
    .log-line[data-level="info"] { color: #9fd8ff; }
    .log-line[data-level="debug"] { color: #b8b8ff; }
    .log-time {
      color: #7a8492;
      margin-right: 0.4rem;
    }
    .shadow-toggle {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-left: 0.75rem;
      cursor: pointer;
      font: 600 .68rem var(--mono);
      letter-spacing: 0.06em;
      color: var(--muted);
      user-select: none;
    }
    .shadow-toggle input { display: none; }
    .shadow-toggle span {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 0.18rem 0.5rem;
      transition: color .15s, border-color .15s, background .15s;
    }
    .shadow-toggle input:checked + span {
      color: var(--accent2);
      border-color: rgba(129,140,248,0.45);
      background: rgba(129,140,248,0.14);
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
      .devtools-pane { display: none; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="editor-pane">
      <div class="pane-header">
        <span class="tbar-dot r"></span>
        <span class="tbar-dot y"></span>
        <span class="tbar-dot g"></span>
        <span class="pane-title">playground</span>
        <span class="pane-badge">LIVE</span>
      </div>
      <div class="file-tabs" id="file-tabs"></div>
      <div class="editors-container" id="editors-container"></div>
    </div>
    <div class="devtools-pane">
      <div class="pane-header">
        <span class="pane-title">Signals</span>
      </div>
      <div id="devtools-container"></div>
      <div class="pane-header" style="margin-top:auto;border-top:1px solid rgba(255,255,255,0.06)">
        <span class="pane-title">Output</span>
        <label class="shadow-toggle" title="Toggle shadow DOM mode">
          <input type="checkbox" id="shadow-toggle" autocomplete="off">
          <span>@shadow</span>
        </label>
        <div class="tabbar">
          <button class="tab-btn active" data-tab="output" type="button">Output</button>
          <button class="tab-btn" data-tab="logs" type="button">Logs</button>
          <button class="tab-btn" id="clear-logs" type="button" title="Clear logs" aria-label="Clear logs">🗑</button>
        </div>
      </div>
      <div class="tab-panels">
        <div id="render-container" class="tab-panel active"></div>
        <div id="log-container" class="tab-panel"></div>
      </div>
    </div>
  </div>
  <script type="module">
    import { devtools } from './dist/runtime.js';
    
    const STORAGE_KEY = '10x:playground:files';
    const DEFAULT_FILES = [
      {
        id: 'file-button',
        name: 'button.md',
        value: `# Button Component

Btn = props =>
  @html
    <button id={props.id} class={props.class} style="padding:0.5rem 1rem;font-size:1rem;cursor:pointer;border-radius:4px;border:1px solid #444;background:#1a1a2e;color:#e2e8f0">
      #{props.label}
    </button>.`
      },
      {
        id: 'file-counter',
        name: 'counter.md',
        value: `# Counter

count = @signal 0.

@render "#render-container" @html
  <div style="text-align:center;padding:2rem;font-family:system-ui">
    <h1 style="font-size:3rem;margin:0.5rem 0">Count: #{count}</h1>
    <div style="display:flex;gap:0.5rem;justify-content:center">
      <Btn id="dec" label="-" class="btn" />
      <Btn id="inc" label="+" class="btn" />
    </div>
  </div>.

@on :click "#dec" count = count - 1.
@on :click "#inc" count = count + 1.`
      }
    ];

    const uid = () => `file-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    
    const loadFiles = () => {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (e) {}
      return DEFAULT_FILES;
    };
    
    const saveFiles = (files) => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
      } catch (e) {}
    };

    const debug = new URLSearchParams(window.location.search).get('debug');
    globalThis.__10x_devtools_debug = debug === '1' || debug === 'true';
    devtools({ docked: true, container: document.getElementById('devtools-container') });

    let files = loadFiles();
    let activeId = files[0]?.id || null;
    const editors = new Map();

    const fileTabsEl = document.getElementById('file-tabs');
    const editorsContainerEl = document.getElementById('editors-container');

    const renderTabs = () => {
      fileTabsEl.innerHTML = '';
      files.forEach((file) => {
        const tab = document.createElement('div');
        tab.className = `file-tab${file.id === activeId ? ' active' : ''}`;
        tab.dataset.id = file.id;
        tab.innerHTML = `
          <span class="tab-name">${file.name}</span>
          <span class="close-btn" title="Close ${file.name}">×</span>
        `;
        tab.querySelector('.tab-name').addEventListener('click', () => activateFile(file.id));
        tab.querySelector('.close-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          closeFile(file.id);
        });
        fileTabsEl.appendChild(tab);
      });
      
      const addBtn = document.createElement('button');
      addBtn.className = 'add-file-btn';
      addBtn.title = 'Add new file';
      addBtn.textContent = '+';
      addBtn.addEventListener('click', addFile);
      fileTabsEl.appendChild(addBtn);
    };

    const renderEditors = () => {
      editorsContainerEl.innerHTML = '';
      editors.clear();
      
      files.forEach((file) => {
        const editorEl = document.createElement('x-editor');
        editorEl.id = `ed-${file.id}`;
        editorEl.className = `playground-editor${file.id === activeId ? ' active' : ''}`;
        editorEl.setAttribute('value', file.value);
        editorEl.style.cssText = 'display:block;height:100%;';
        editorsContainerEl.appendChild(editorEl);
        editors.set(file.id, editorEl);
        
        editorEl.addEventListener('tenx-signals', ({ detail }) => {
          if (globalThis.__10x_devtools_debug) {
            console.info('[10x:devtools.html] tenx-signals event', { fileId: file.id });
          }
          globalThis.__10x_devtools?.onSignals?.(detail);
        });
      });
    };

    const activateFile = (id) => {
      if (!editors.has(id)) return;
      
      // Save current editor value before switching
      if (activeId && editors.has(activeId)) {
        const currentEditor = editors.get(activeId);
        const currentFile = files.find(f => f.id === activeId);
        if (currentFile) currentFile.value = currentEditor.value;
      }
      
      activeId = id;
      
      // Update tab styles
      fileTabsEl.querySelectorAll('.file-tab').forEach((tab) => {
        tab.classList.toggle('active', tab.dataset.id === id);
      });
      
      // Update editor visibility
      editors.forEach((editor, editorId) => {
        editor.classList.toggle('active', editorId === id);
      });
      
      saveFiles(files);
    };

    const addFile = () => {
      const newId = uid();
      const existingNames = new Set(files.map(f => f.name));
      let newName = 'untitled.md';
      let i = 1;
      while (existingNames.has(newName)) {
        newName = `untitled${i}.md`;
        i++;
      }
      
      files.push({ id: newId, name: newName, value: '' });
      saveFiles(files);
      renderTabs();
      renderEditors();
      activateFile(newId);
    };

    const closeFile = (id) => {
      if (files.length <= 1) return;
      
      const idx = files.findIndex(f => f.id === id);
      if (idx === -1) return;
      
      files.splice(idx, 1);
      
      if (activeId === id) {
        activeId = files[0].id;
      }
      
      saveFiles(files);
      renderTabs();
      renderEditors();
    };

    // Initialize
    renderTabs();
    renderEditors();

    // Transform existing editor code by adding/removing @shadow annotations in-place.
    const setShadowMode = (code, enabled) => {
      let result = code
        .replace(/(@render\b[^.]*?) @shadow (@html\b)/g, '$1 $2')
        .replace(/(@on\b\s+:[^\s]+\s+"[^"]*")\s+@shadow\s+/g, '$1 ');
      if (!enabled) return result;
      return result
        .replace(/(@render\b[^.]*?) (@html\b)/g, '$1 @shadow $2')
        .replace(/(@on\b\s+:[^\s]+\s+"[^"]*")\s+/g, '$1 @shadow ');
    };

    const shadowToggle = document.getElementById('shadow-toggle');
    const resetRenderContainer = () => {
      const old = document.getElementById('render-container');
      const fresh = document.createElement('div');
      fresh.id = 'render-container';
      fresh.className = old.className;
      old.replaceWith(fresh);
      panels.output = fresh;
    };

    shadowToggle.addEventListener('change', () => {
      resetRenderContainer();
      files.forEach((file) => {
        const editor = editors.get(file.id);
        if (editor) {
          file.value = setShadowMode(editor.value, shadowToggle.checked);
          editor.value = file.value;
        }
      });
      saveFiles(files);
    });

    const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));
    const renderPanel = document.getElementById('render-container');
    const logPanel = document.getElementById('log-container');
    const clearLogsBtn = document.getElementById('clear-logs');
    const panels = {
      output: renderPanel,
      logs: logPanel,
    };

    const setTab = (tab) => {
      tabButtons.forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
      Object.entries(panels).forEach(([name, panel]) => {
        panel.classList.toggle('active', name === tab);
      });
    };

    tabButtons.forEach((btn) => {
      if (btn.id === 'clear-logs') return;
      btn.addEventListener('click', () => setTab(btn.dataset.tab));
    });

    clearLogsBtn?.addEventListener('click', () => {
      logPanel.innerHTML = '';
    });

    const MAX_LOG_LINES = 250;
    const formatLogArg = (value) => {
      if (typeof value === 'string') return value;
      try {
        return JSON.stringify(value);
      } catch (_) {
        return String(value);
      }
    };

    const appendRuntimeLog = ({ level = 'log', args = [], ts = Date.now(), source = 'runtime' } = {}) => {
      const line = document.createElement('div');
      line.className = 'log-line';
      line.dataset.level = level;
      const time = new Date(ts).toLocaleTimeString();
      line.innerHTML = `<span class="log-time">${time}</span><strong>[${level}]</strong> [${source}] ${args.map(formatLogArg).join(' ')}`;
      logPanel.appendChild(line);
      while (logPanel.children.length > MAX_LOG_LINES) {
        logPanel.removeChild(logPanel.firstChild);
      }
      if (logPanel.classList.contains('active')) {
        logPanel.scrollTop = logPanel.scrollHeight;
      }
    };

    globalThis.__10x_runtime_log = appendRuntimeLog;
  </script>
</body>
</html>
